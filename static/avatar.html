<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avatar Viewer</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f5f5f5; }
      .container { padding: 1rem; }
      #viewer { width: 100%; height: 80vh; border: 1px solid #444; background: linear-gradient(180deg, #0f172a 0%, #111827 100%); }
      .status { margin-bottom: 0.75rem; color: #8dd3ff; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Arm Reachability Avatar</h1>
      <div id="status" class="status">Loading libraries...</div>
      <div id="viewer"></div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "/static/three.module.js",
        "three/addons/loaders/GLTFLoader.js": "/static/GLTFLoader.js",
        "three/addons/controls/OrbitControls.js": "/static/OrbitControls.js"
      }
    }
    </script>

    <script type="module">
      // Use dynamic imports for Three.js modules
      const THREE = await import('/static/three.module.js').catch(() => {
        // Fallback: load from global if module approach fails
        return new Promise((resolve) => {
          const script = document.createElement('script');
          script.src = '/static/three.min.js';
          script.onload = () => resolve(window.THREE);
          document.head.appendChild(script);
        });
      });

      // Import loaders as modules
      const { GLTFLoader } = await import('/static/GLTFLoader.js');
      const { OrbitControls } = await import('/static/OrbitControls.js');

      const statusEl = document.getElementById('status');
      const container = document.getElementById('viewer');

      if (!THREE || !GLTFLoader) {
        statusEl.textContent = 'Failed to load libraries';
        console.error('Library loading failed');
        throw new Error('Missing required libraries');
      }

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111827);

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        100
      );
      camera.position.set(0, 0, 1.0);  // Closer to the avatar

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 1.0, 0);

      const ambient = new THREE.AmbientLight(0xffffff, 1.3);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
      dirLight.position.set(3, 4, 5);
      scene.add(dirLight);

      const loader = new GLTFLoader();
      let avatarModel = null;
      let boneMap = {};

      loader.load(
        '/static/avatar_model/scene.gltf',
        (gltf) => {
          avatarModel = gltf.scene;
          avatarModel.scale.set(1.0, 1.0, 1.0);
          avatarModel.position.set(0, 0, 0);
          scene.add(avatarModel);

          const allBones = [];
          avatarModel.traverse((child) => {
            if (child.isBone) {
              allBones.push(child.name);
              const name = child.name.toLowerCase();
              if (
                name.includes('upperarm') ||
                name.includes('forearm') ||
                name.includes('hand') ||
                name.includes('shoulder') ||
                name.includes('arm')
              ) {
                boneMap[name] = child;
              }
            }
          });
          
          console.log('All bones in model:', allBones);
          console.log('Mapped arm bones:', Object.keys(boneMap));

          statusEl.textContent = 'Avatar loaded - waiting for pose data';
        },
        (progress) => {
          if (progress.loaded && progress.total) {
            statusEl.textContent = `Loading avatar... ${Math.round(
              (progress.loaded / progress.total) * 100
            )}%`;
          }
        },
        (error) => {
          console.error('glTF loading error:', error);
          statusEl.textContent = 'Avatar failed to load';
        }
      );

      const socket = new WebSocket(`ws://${window.location.host}/ws`);
      let latestPose = null;

      socket.addEventListener('open', () => {
        console.log('WebSocket connected');
      });

      socket.addEventListener('message', (event) => {
        try {
          latestPose = JSON.parse(event.data);
          console.log('Received pose:', latestPose);
          statusEl.textContent = 'Avatar animating - ' + new Date().toLocaleTimeString();
        } catch (error) {
          console.error('Invalid websocket payload', error);
        }
      });

      socket.addEventListener('close', () => {
        statusEl.textContent = 'Disconnected';
      });

      socket.addEventListener('error', (error) => {
        console.error('WebSocket error:', error);
        statusEl.textContent = 'WebSocket connection error';
      });

      function updateAvatarFromPose() {
        if (!avatarModel || !latestPose) return;

        const joints = latestPose.joints || {};
        const shoulder = joints.right_shoulder;
        const wrist = joints.right_wrist;

        if (!shoulder || !wrist) return;

        // Since the model has no skeleton, translate the entire avatar
        // based on shoulder position to show movement
        const shoulderVec = new THREE.Vector3(
          shoulder.x || 0,
          shoulder.y || 0,
          shoulder.z || 0
        ).multiplyScalar(1.5);

        // Move avatar to follow shoulder position
        avatarModel.position.copy(shoulderVec);
        
        // Optionally rotate based on wrist position relative to shoulder
        const wristVec = new THREE.Vector3(
          wrist.x || 0,
          wrist.y || 0,
          wrist.z || 0
        ).multiplyScalar(1.5);
        
        const direction = new THREE.Vector3().subVectors(wristVec, shoulderVec).normalize();
        if (direction.length() > 0) {
          const quaternion = new THREE.Quaternion();
          quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), direction);
          avatarModel.quaternion.slerp(quaternion, 0.2);
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        updateAvatarFromPose();
        renderer.render(scene, camera);
      }

      window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });

      animate();
    </script>
  </body>
</html>
